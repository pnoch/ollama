name: release-fork-linux

on:
  workflow_dispatch:

jobs:
  linux-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }}
      PLATFORM: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Build Linux amd64 bundle
        run: |
          export VERSION="${VERSION#pnoch-v}"
          export GOFLAGS="'-ldflags=-w -s \"-X=github.com/ollama/ollama/version.Version=$VERSION\" \"-X=github.com/ollama/ollama/server.mode=release\"'"
          docker buildx build \
            --output type=local,dest=./dist/linux_amd64 \
            --platform=linux/amd64 \
            --build-arg VERSION \
            --build-arg GOFLAGS \
            --build-arg FLAVOR=cpu \
            --target archive \
            -f Dockerfile \
            .

      - name: Build Linux arm64 bundle
        run: |
          export VERSION="${VERSION#pnoch-v}"
          export GOFLAGS="'-ldflags=-w -s \"-X=github.com/ollama/ollama/version.Version=$VERSION\" \"-X=github.com/ollama/ollama/server.mode=release\"'"
          docker buildx build \
            --output type=local,dest=./dist/linux_arm64 \
            --platform=linux/arm64 \
            --build-arg VERSION \
            --build-arg GOFLAGS \
            --build-arg FLAVOR=cpu \
            --target archive \
            -f Dockerfile \
            .

      - name: Package Linux release bundles
        run: |
          tar c -C ./dist/linux_amd64 bin lib | zstd --ultra -22 -T0 >./dist/ollama-linux-amd64.tar.zst
          tar c -C ./dist/linux_arm64 bin lib | zstd --ultra -22 -T0 >./dist/ollama-linux-arm64.tar.zst

      - name: Prepare installer
        run: |
          sed 's|https://ollama.com/download|https://github.com/pnoch/ollama/releases/latest/download|g' \
            scripts/install.sh > dist/install.sh
          chmod +x dist/install.sh

      - name: Generate checksums
        run: |
          find dist -maxdepth 1 -type f -printf '%f\n' | sort | xargs -I{} sh -c 'cd dist && sha256sum "{}"' > dist/sha256sum.txt

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}"
          else
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes
          fi

      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/install.sh \
            dist/sha256sum.txt \
            dist/*.tar.zst \
            --clobber
